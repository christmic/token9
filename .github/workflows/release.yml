name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            os: macos
            arch: arm64
            target: aarch64-apple-darwin
          - runner: macos-13
            os: macos
            arch: x86_64
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set VERSION env
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Rust server
        if: matrix.os == 'macos' || matrix.os == 'linux'
        run: |
          cargo build --release --target ${{ matrix.target }} --manifest-path token9-server/Cargo.toml
          mkdir -p dist/token9-${{ matrix.os }}-${{ matrix.arch }}/bin
          cp token9-server/target/${{ matrix.target }}/release/token9 dist/token9-${{ matrix.os }}-${{ matrix.arch }}/bin/
          strip dist/token9-${{ matrix.os }}-${{ matrix.arch }}/bin/token9

      - name: Install Swift toolchain
        if: matrix.os == 'macos'
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ matrix.arch == 'arm64' && '15' || '14' }}.app/Contents/Developer 2>/dev/null || true

      - name: Generate Swift types
        if: matrix.os == 'macos'
        run: |
          cargo install typeshare-cli
          ./scripts/gen-types.sh

      - name: Build Swift app
        if: matrix.os == 'macos'
        working-directory: token9-apps/macos
        run: |
          swift build -c release
          BIN=$(swift build -c release --show-bin-path)
          mkdir -p ../../dist/token9-${{ matrix.os }}-${{ matrix.arch }}/Token9.app/Contents/MacOS
          cp "$BIN/Token9" ../../dist/token9-${{ matrix.os }}-${{ matrix.arch }}/Token9.app/Contents/MacOS/Token9

      - name: Assemble Info.plist
        if: matrix.os == 'macos'
        run: |
          cat > dist/token9-${{ matrix.os }}-${{ matrix.arch }}/Token9.app/Contents/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>Token9</string>
            <key>CFBundleIdentifier</key><string>ai.oraculo.token9</string>
            <key>CFBundleName</key><string>token9</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>0.1.0</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSUIElement</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Package tarball
        run: |
          cd dist
          tar -czf token9-v${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz token9-${{ matrix.os }}-${{ matrix.arch }}
          shasum -a 256 token9-v${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz | tee -a $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: token9-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/token9-v*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*.tar.gz
